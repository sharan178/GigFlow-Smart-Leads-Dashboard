server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively — Vite fingerprints filenames on build
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other requests fall back to index.html for SPA (React Router) routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
